board_build.ldscript = ./STM32F103C8_APP_FLASH.ld
build_flags = -DUSE_HAL_DRIVER -DSTM32F103xE -DAPP_VECT_TAB_OFFSET=0x4000U -lc -lm -g -ggdb -D VARIANT_PWM


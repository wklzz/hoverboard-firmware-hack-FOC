; PlatformIO Project Configuration File
; 针对平衡车主控 16KB Bootloader 优化的配置文件

[platformio]
include_dir = Inc
src_dir     = Src
; 默认编译环境设置为 PWM 的 Bootloader 版本，方便你直接测试
default_envs = VARIANT_PWM_BL

;=================== 基础通用配置 ==========================
[env]
platform        = ststm32
framework       = stm32cube
board           = genericSTM32F103RC
debug_tool      = stlink
upload_protocol = stlink
monitor_speed   = 115200
; monitor_port    = COM5 ; 根据需要取消注释

;=================== 标准版本 (0x08000000) ==========================
; 用于 ST-Link 直接烧录，不经过 Bootloader

[env:VARIANT_ADC]
build_flags = -DUSE_HAL_DRIVER -DSTM32F103xE -T./STM32F103RCTx_FLASH.ld -lc -lm -g -ggdb -D VARIANT_ADC

[env:VARIANT_USART]
build_flags = -DUSE_HAL_DRIVER -DSTM32F103xE -T./STM32F103RCTx_FLASH.ld -lc -lm -g -ggdb -D VARIANT_USART

[env:VARIANT_NUNCHUK]
build_flags = -DUSE_HAL_DRIVER -DSTM32F103xE -T./STM32F103RCTx_FLASH.ld -lc -lm -g -ggdb -D VARIANT_NUNCHUK

[env:VARIANT_PPM]
build_flags = -DUSE_HAL_DRIVER -DSTM32F103xE -T./STM32F103RCTx_FLASH.ld -lc -lm -g -ggdb -D VARIANT_PPM

[env:VARIANT_PWM]
build_flags = -DUSE_HAL_DRIVER -DSTM32F103xE -T./STM32F103RCTx_FLASH.ld -lc -lm -g -ggdb -D VARIANT_PWM

[env:VARIANT_IBUS]
build_flags = -DUSE_HAL_DRIVER -DSTM32F103xE -T./STM32F103RCTx_FLASH.ld -lc -lm -g -ggdb -D VARIANT_IBUS

[env:VARIANT_HOVERCAR]
build_flags = -DUSE_HAL_DRIVER -DSTM32F103xE -T./STM32F103RCTx_FLASH.ld -lc -lm -g -ggdb -D VARIANT_HOVERCAR

[env:VARIANT_HOVERBOARD]
build_flags = -DUSE_HAL_DRIVER -DSTM32F103xE -T./STM32F103RCTx_FLASH.ld -lc -lm -g -ggdb -D VARIANT_HOVERBOARD

[env:VARIANT_TRANSPOTTER]
build_flags = -DUSE_HAL_DRIVER -DSTM32F103xE -T./STM32F103RCTx_FLASH.ld -lc -lm -g -ggdb -D VARIANT_TRANSPOTTER

[env:VARIANT_SKATEBOARD]
build_flags = -DUSE_HAL_DRIVER -DSTM32F103xE -T./STM32F103RCTx_FLASH.ld -lc -lm -g -ggdb -D VARIANT_SKATEBOARD

;=================== Bootloader 兼容版本 (0x08004000) ==========================
; 关键：使用 board_build.ldscript 强制重定位，并设置 16KB 向量表偏移

[env:VARIANT_ADC_BL]
extends = env:VARIANT_ADC
board_build.ldscript = ./STM32F103C8_APP_FLASH.ld
build_flags = -DUSE_HAL_DRIVER -DSTM32F103xE -DAPP_VECT_TAB_OFFSET=0x4000U -lc -lm -g -ggdb -D VARIANT_ADC

[env:VARIANT_USART_BL]
extends = env:VARIANT_USART
board_build.ldscript = ./STM32F103C8_APP_FLASH.ld
build_flags = -DUSE_HAL_DRIVER -DSTM32F103xE -DAPP_VECT_TAB_OFFSET=0x4000U -lc -lm -g -ggdb -D VARIANT_USART

